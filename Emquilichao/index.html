<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Emquilichao</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #8DC63F;
            color: white;
            padding: 0.5rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }

        .header-logos {
            position: fixed;
            top: 2rem;
            left: 0;
            right: 0;
            background: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 1rem 100px;
        }

        .header-logos img {
            height: 70px;
        }

        body {
            background: #003087;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin: auto;
            margin-top: 220px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: #002670;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .error-message {
            color: #dc3545;
            margin-top: 1rem;
            text-align: center;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>Empresa de Servicios Públicos</div>
        <div>Santander de Quilichao, Cauca</div> 
    </div>
    <div class="header-logos">
        <img src="imagenes/logo.jpeg" alt="Logo Emquilichao">
        <img src="imagenes/parte superior.png" alt="Logo Superior">
    </div>

    <div class="login-container">
        <h2 style="text-align: center; color: #333; margin-bottom: 1.5rem;">Iniciar Sesión</h2>
        <form id="loginForm" onsubmit="return iniciarSesion(event)">
            <div class="form-group">
                <label for="usuario">Usuario:</label>
                <input type="text" id="usuario" name="usuario" required>
            </div>
            <div class="form-group">
                <label for="contrasena">Contraseña:</label>
                <input type="password" id="contrasena" name="contrasena" required>
            </div>
            <button type="submit">Iniciar Sesión</button>
            <div id="errorMessage" class="error-message"></div>
        </form>
    </div>

    <script>
        async function iniciarSesion(event) {
            event.preventDefault();
            
            const usuario = document.getElementById('usuario').value;
            const contrasena = document.getElementById('contrasena').value;
            const errorMessage = document.getElementById('errorMessage');

            try {
                const response = await fetch('./procesar/procesar_login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: `usuario=${encodeURIComponent(usuario)}&contrasena=${encodeURIComponent(contrasena)}`
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = 'inicio.html';
                } else {
                    errorMessage.style.display = 'block';
                    errorMessage.textContent = data.message || 'Error al iniciar sesión';
                }
            } catch (error) {
                errorMessage.style.display = 'block';
                errorMessage.textContent = 'Error de conexión. Por favor, intente nuevamente.';
            }

            return false;
        }
    </script>
</body>
</html>
