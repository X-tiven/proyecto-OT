<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar Trabajador - Emquilichao</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            padding-top: 150px;
            min-height: 100vh;
            background: #003087;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #8DC63F;
            color: white;
            padding: 0.5rem;
            text-align: center;
            display: flex;
            justify-content: space-between;
            font-family: Arial, sans-serif;
            z-index: 1000;
        }

         .header-logos {
            position: fixed;
            top: 2rem;
            left: 0;
            right: 0;
            background: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            padding: 1rem 100px;
            z-index: 999;
        }

        .header-logos img {
            height: 60px;
        }

             .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 200px;
            background: #002670;
            padding-top: 200px;
            color: white;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            z-index: 998;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
        }

        .sidebar-menu li:hover {
            background: rgba(255,255,255,0.1);
        }

        .submenu {
            display: none;
            list-style: none;
            background: #001a4d;
            padding: 0.5rem 0;
        }

        .submenu li {
            padding: 0.6rem 2rem;
            border-bottom: none;
            font-size: 0.9em;
        }

        .submenu.active {
            display: block;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item::after {
            content: '▼';
            font-size: 0.8em;
            transition: transform 0.3s;
        }

        .menu-item.active::after {
            transform: rotate(180deg);
        }

        .form-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            margin: 1rem auto;
            text-align: center;
            transform: translateX(100px);
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            border-color: #8DC63F;
            outline: none;
            box-shadow: 0 0 5px rgba(141, 198, 63, 0.2);
        }

        button {
            background-color: #8DC63F;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #7ab32e;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div>Empresa de Servicios Públicos</div>
        <div>Santander de Quilichao, Cauca</div>
    </div>
    <div class="header-logos">
        <img src="imagenes/logo.jpeg" alt="Logo Emquilichao">
        <img src="imagenes/parte superior.png" alt="Logo Empresa">
    </div>

     <div class="sidebar">
        <ul class="sidebar-menu">
            <li>
                <a href="inicio.html" style="color: white; text-decoration: none; display: block;">Inicio</a>
            </li>
            <li>
                <div class="menu-item">Trabajadores</div>
                <ul class="submenu">
                    <li><a href="insertar_trabajador.html" style="color: white; text-decoration: none; display: block;">Registrar Trabajador</a></li>
                                        <li><a href="Lista_trabajadores.html" style="color: white; text-decoration: none; display: block;">Lista de Trabajadores</a></li>
                    <li><a href="editar_trabajador.html" style="color: white; text-decoration: none;">Editar Trabajador</a></li>
                    <li><a href="eliminar_trabajador.html" style="color: white; text-decoration: none; display: block;">Eliminar Trabajador</a></li>
                </ul>
            </li>
            <li>
                <div class="menu-item">Plan Diario</div>
                <ul class="submenu">
                    <li><a href="insertar_plan.html" style="color: white; text-decoration: none;">Insertar Plan</a></li>
                </ul>
            </li>
            <li>
                <a href="index.html" onclick="cerrarSesion()" style="color: white; text-decoration: none; display: block;">Cerrar Sesión</a>
            </li>
        </ul>
    </div>

    <div class="form-container">
        <h2>Eliminar Trabajador</h2>
        <form id="deleteWorkerForm">
            <div class="form-group">
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>
            <div class="form-group">
                <label for="apellido">Apellido:</label>
                <input type="text" id="apellido" name="apellido" required>
            </div>
            <button type="submit">Eliminar Trabajador</button>
        </form>
    </div>
    <script>
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', () => {
                item.classList.toggle('active');
                const submenu = item.nextElementSibling;
                if (submenu && submenu.classList.contains('submenu')) {
                    submenu.classList.toggle('active');
                }
            });
        });
    </script>
</body>
</html>
